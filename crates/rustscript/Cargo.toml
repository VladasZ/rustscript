[package]
name = "rustscript"
version = "0.1.0"
edition = "2024"

[[bin]]
name = "rust"
path = "src/main.rs"

[dependencies]
anyhow = { workspace = true }
syn = { workspace = true }
proc-macro2 = { workspace = true }
serde_json = { workspace = true, features = ["preserve_order"] }
ureq = { workspace = true }
regex = { workspace = true }
indexmap = { workspace = true }
