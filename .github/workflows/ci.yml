name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: Swatinem/rust-cache@v2
      # Clippy covers the whole workspace, so it builds bench and needs the same
      # system fontconfig the test job does.
      - name: Install fontconfig
        run: sudo apt-get update && sudo apt-get install -y libfontconfig1-dev
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: Test ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v5
      - uses: Swatinem/rust-cache@v2
      # The bench crate draws charts with plotters, which links system
      # fontconfig on Linux. macOS and Windows use their own font stacks.
      - name: Install fontconfig
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libfontconfig1-dev
      - run: cargo test --workspace
